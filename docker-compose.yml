services:
  app:
    image: notaria-web-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: notaria-web
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
